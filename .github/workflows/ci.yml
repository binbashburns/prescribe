name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Permissions for the Pages deploy job. All other jobs run with read-only.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  validate:
    name: Validate (JS syntax + ontology consistency)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate JS syntax
        run: |
          for f in app.js entities.js erd-source.js automations.js mockups.js; do
            echo "checking $f"
            node --check "$f"
          done
      - name: Cross-check entities, automations, and mockups
        run: node ci/check-consistency.js

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install semgrep
      - name: Run Semgrep
        run: semgrep --config=auto --output=semgrep-results.json --json . || true
      - name: Upload SAST results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  secrets:
    name: Secret Scanning (detect-secrets)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run detect-secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files > secrets-report.json || true
      - name: Upload secrets scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secrets-report
          path: secrets-report.json

  sbom:
    name: SBOM Generation (Syft)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Generate SBOM
        run: syft dir:. -o cyclonedx-json=sbom.cyclonedx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json

  grype:
    name: CVE Scan (Grype)
    runs-on: ubuntu-latest
    needs: sbom
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Run Grype CVE scan
        run: grype sbom:sbom.cyclonedx.json -o json > grype-results.json || true
      - name: Upload Grype results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grype-results
          path: grype-results.json

  pages-build-deploy:
    name: Build and Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Strip non-public artifacts before deploy
        run: |
          # context/ is gitignored so should not be in the checkout, but be defensive.
          rm -rf context/ ci/ .github/ || true
          # Remove this redundant top-level CLAUDE.md from the deploy artifact -
          # it is internal AI-assistant context.
          rm -f CLAUDE.md || true
          ls -la
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
