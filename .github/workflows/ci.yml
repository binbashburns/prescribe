name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Permissions for the Pages deploy job. All other jobs run with read-only.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  validate:
    name: Validate (JS syntax + ontology consistency)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate JS syntax
        run: |
          for f in app.js entities.js erd-source.js automations.js mockups.js; do
            echo "checking $f"
            node --check "$f"
          done
      - name: Cross-check entities, automations, and mockups
        run: node ci/check-consistency.js

  pages-build-deploy:
    name: Build and Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Strip non-public artifacts before deploy
        run: |
          # context/ is gitignored so should not be in the checkout, but be defensive.
          rm -rf context/ ci/ .github/ || true
          # Remove this redundant top-level CLAUDE.md from the deploy artifact -
          # it is internal AI-assistant context.
          rm -f CLAUDE.md || true
          ls -la
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
